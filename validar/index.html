<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de Certificado</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    h1 {
      color: #333;
    }
    #resultado {
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
    }
    .valido {
      color: green;
    }
    .invalido {
      color: red;
    }
  </style>
</head>
<body>
  <h1>Validación de Certificado</h1>
  <p id="resultado">Verificando...</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hash = params.get("hash");

    if (!hash) {
      document.getElementById("resultado").textContent = "⚠️ No se proporcionó un código de validación.";
    } else {
      // Leer validos.json directamente desde el repo
      fetch("https://raw.githubusercontent.com/simonneusil22/certificados/main/validos.json?t=" + Date.now())
        .then(res => res.json())
        .then(data => {
          const existe = data.hashes_validos.some(item => item.hash === hash);
          if (existe) {
            document.getElementById("resultado").textContent = "✅ Certificado válido";
            document.getElementById("resultado").className = "valido";
          } else {
            document.getElementById("resultado").textContent = "⚠️ Certificado inválido. Llame al cabildo para mayor información.";
            document.getElementById("resultado").className = "invalido";
          }
        })
        .catch(err => {
          document.getElementById("resultado").textContent = "Error al verificar el certificado.";
          console.error(err);
        });
    }
  </script>
</body>
</html>
