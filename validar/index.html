<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Validación de Certificado</title>
</head>
<body>
  <h1>Validación de Certificado</h1>
  <p id="resultado">Verificando...</p>

  <script>
    const hash = window.location.pathname.split("/").pop();

    fetch("../validos.json")
      .then(res => res.json())
      .then(data => {
        if (data.hashes_validos.includes(hash)) {
          document.getElementById("resultado").textContent = "✅ Certificado válido";
        } else {
          document.getElementById("resultado").textContent =
            "⚠️ Certificado inválido. Llame al cabildo para mayor información.";
        }
      })
      .catch(err => {
        document.getElementById("resultado").textContent =
          "Error al verificar el certificado.";
        console.error(err);
      });
  </script>
</body>
</html>
